version: 2

updates:
  # === Python (pip) ===
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Europe/Madrid"
    open-pull-requests-limit: 10
    reviewers:
      - "blazquezgaralberto"
    labels:
      - "dependencies"
      - "python"
      - "security"
    # Agrupar actualizaciones de producción en un solo PR
    groups:
      production-dependencies:
        dependency-type: "production"
      development-dependencies:
        dependency-type: "development"
    # Ignorar actualizaciones de major version (rompen API)
    ignore:
      - dependency-name: "flask"
        update-types: ["version-update:semver-major"]

  # === Node.js (npm) ===
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:30"
      timezone: "Europe/Madrid"
    open-pull-requests-limit: 10
    reviewers:
      - "blazquezgaralberto"
    labels:
      - "dependencies"
      - "javascript"
      - "security"
    groups:
      npm-production:
        dependency-type: "production"
      npm-development:
        dependency-type: "development"

  # === GitHub Actions ===
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "08:00"
      timezone: "Europe/Madrid"
    labels:
      - "dependencies"
      - "github-actions"
